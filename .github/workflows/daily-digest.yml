name: Daily Voice News

on:
  schedule:
    - cron: '0 13 * * *'    # 9:00 AM EDT (UTC-4)
    - cron: '0 14 * * *'    # 9:00 AM EST (UTC-5)
    - cron: '20 1 * * *'    # 9:20 PM EDT (UTC-4)
    - cron: '20 2 * * *'    # 9:20 PM EST (UTC-5)
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  actions: read

jobs:
  generate:
    runs-on: self-hosted
    env:
      PYTHON: /opt/homebrew/bin/python3.12
      VENV: /tmp/voice-news-venv
    steps:
      - name: Skip if wrong DST offset
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(TZ=America/New_York date +%H)
          MINUTE=$(TZ=America/New_York date +%M)
          ET="${HOUR}:${MINUTE}"
          echo "Current Eastern time: $ET"
          # Accept if we're within 15 minutes of 9:00 or 21:20
          if [[ "$HOUR" == "09" || ("$HOUR" == "21" && "$MINUTE" -ge 5 && "$MINUTE" -le 35) ]]; then
            echo "On schedule, proceeding."
          else
            echo "Off schedule (DST mismatch), skipping."
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4

      - name: Restore seen_articles.json from previous artifact
        run: |
          mkdir -p /tmp/voice-news-build
          # Try to download the latest seen_articles artifact via gh CLI
          gh run list --workflow="Daily Voice News" --status=success --limit=1 --json databaseId --jq '.[0].databaseId' > /tmp/last_run_id.txt 2>/dev/null || true
          LAST_RUN_ID=$(cat /tmp/last_run_id.txt)
          if [ -n "$LAST_RUN_ID" ]; then
            gh run download "$LAST_RUN_ID" -n seen-articles -D /tmp/seen-restore 2>/dev/null || true
            if [ -f /tmp/seen-restore/seen_articles.json ]; then
              cp /tmp/seen-restore/seen_articles.json /tmp/voice-news-build/seen_articles.json
              echo "Restored seen_articles.json from run $LAST_RUN_ID"
            else
              echo '[]' > /tmp/voice-news-build/seen_articles.json
              echo "No seen_articles artifact found, starting fresh"
            fi
          else
            echo '[]' > /tmp/voice-news-build/seen_articles.json
            echo "No previous successful run found, starting fresh"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check prerequisites
        run: |
          $PYTHON --version
          file $($PYTHON -c "import sys; print(sys.executable)")
          ollama --version
          ffmpeg -version | head -1
          echo "All prerequisites found."

      - name: Set up virtual environment and install dependencies
        run: |
          if [ ! -f "$VENV/bin/python3" ]; then
            echo "Creating new virtual environment..."
            rm -rf "$VENV"
            $PYTHON -m venv "$VENV"
          fi
          REQS_HASH=$(md5 -q requirements.txt)
          CACHED_HASH=""
          [ -f "$VENV/.reqs_hash" ] && CACHED_HASH=$(cat "$VENV/.reqs_hash")
          if [ "$REQS_HASH" != "$CACHED_HASH" ]; then
            echo "Installing/updating dependencies..."
            "$VENV/bin/pip" install --upgrade pip
            "$VENV/bin/pip" install -r requirements.txt
            echo "$REQS_HASH" > "$VENV/.reqs_hash"
          else
            echo "Dependencies up to date, skipping install."
          fi

      - name: Run pipeline
        run: |
          "$VENV/bin/python3" main.py \
            --config config.example.yaml \
            --output-dir /tmp/voice-news-build \
            --no-play

      - name: Convert WAV to MP3
        run: |
          WAV_FILE=$(ls -t /tmp/voice-news-build/digest_*.wav | head -1)
          echo "Converting $WAV_FILE"
          ffmpeg -y -i "$WAV_FILE" -codec:a libmp3lame -b:a 128k /tmp/voice-news-build/digest.mp3

      - name: Build deploy directory
        run: |
          DEPLOY_DIR=/tmp/voice-news-deploy
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          # Site assets
          cp site/index.html "$DEPLOY_DIR/"
          cp site/style.css "$DEPLOY_DIR/"

          # Generated content
          cp /tmp/voice-news-build/digest.mp3 "$DEPLOY_DIR/"
          cp /tmp/voice-news-build/transcript.txt "$DEPLOY_DIR/"

          # Metadata with generation timestamp
          echo "{\"generated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > "$DEPLOY_DIR/metadata.json"

          echo "Deploy directory contents:"
          ls -lh "$DEPLOY_DIR/"

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/voice-news-deploy

      - name: Upload seen_articles for next run
        uses: actions/upload-artifact@v4
        with:
          name: seen-articles
          path: /tmp/voice-news-build/seen_articles.json
          retention-days: 90

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
